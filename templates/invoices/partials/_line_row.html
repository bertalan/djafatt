{% load djafatt_tags %}
<div class="line-row border-b border-base-300 pb-4 mb-4" id="line-{{ index }}">
    <div class="mb-2">
        <label class="label label-text text-xs">Descrizione</label>
        <input name="lines-{{ index }}-description" class="input input-bordered w-full input-sm" />
    </div>
    <div class="grid grid-cols-12 gap-2 items-end">
        <div class="col-span-3 sm:col-span-2">
            <label class="label label-text text-xs">Prodotto</label>
            <select name="lines-{{ index }}-product"
                    class="select select-bordered w-full select-sm product-select"
                    data-product-fill-url="/invoices/lines/product-fill/{id}/">
                <option value="">—</option>
                {% for p in products %}<option value="{{ p.id }}">{{ p.name }}</option>{% endfor %}
            </select>
        </div>
        <div class="col-span-2">
            <label class="label label-text text-xs">Qtà</label>
            <input name="lines-{{ index }}-quantity" type="number" value="1"
                   step="0.01" min="0"
                   class="input input-bordered w-full input-sm"
                   hx-post="{% url 'invoices-totals' %}"
                   hx-trigger="input changed delay:300ms"
                   hx-target="#totals-sidebar"
                   hx-include="closest form" />
        </div>
        <div class="col-span-2">
            <label class="label label-text text-xs">UdM</label>
            <input name="lines-{{ index }}-unit_of_measure" list="uom-options" placeholder="pz"
                   class="input input-bordered w-full input-sm" />
        </div>
        <div class="col-span-3 sm:col-span-2">
            <label class="label label-text text-xs">Prezzo €</label>
            <input name="lines-{{ index }}-unit_price_display" type="number" step="0.01"
                   class="input input-bordered w-full input-sm"
                   hx-post="{% url 'invoices-totals' %}"
                   hx-trigger="input changed delay:300ms"
                   hx-target="#totals-sidebar"
                   hx-include="closest form" />
        </div>
        <div class="col-span-3 sm:col-span-3">
            <label class="label label-text text-xs">Aliquota IVA</label>
            <select name="lines-{{ index }}-vat_rate"
                    class="select select-bordered w-full select-sm"
                    hx-post="{% url 'invoices-totals' %}"
                    hx-trigger="change"
                    hx-target="#totals-sidebar"
                    hx-include="closest form">
                {% for rate in vat_rates %}<option value="{{ rate.id }}">{{ rate }}</option>{% endfor %}
            </select>
        </div>
        <div class="col-span-1">
            <button type="button"
                    hx-delete="{% url 'invoices-remove-line' index %}"
                    hx-target="#line-{{ index }}"
                    hx-swap="outerHTML"
                    class="btn btn-ghost btn-xs text-error">🗑️</button>
        </div>
    </div>
</div>
