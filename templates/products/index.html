{% extends "base.html" %}
{% load djafatt_tags %}
{% block title %}Prodotti — djafatt{% endblock %}
{% block content %}
<div class="flex flex-col sm:flex-row sm:items-center sm:justify-between mb-6">
    <h1 class="text-2xl font-bold">Prodotti / Servizi</h1>
    {% if not is_read_only %}
    <a href="{% url 'products-create' %}" class="btn btn-primary btn-sm mt-2 sm:mt-0">+ Nuovo Prodotto</a>
    {% endif %}
</div>
<div class="mb-4">
    <input type="search" name="q" placeholder="Cerca prodotto…"
           class="input input-bordered w-full sm:w-80"
           hx-get="{% url 'products-index' %}"
           hx-target="#product-table"
           hx-trigger="input changed delay:300ms"
           hx-push-url="true" />
</div>
<div id="product-table">
    {% include "products/partials/_table.html" %}
</div>
{% endblock %}
