{% load django_vite %}
<!DOCTYPE html>
<html lang="it" data-theme="business">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — djafatt</title>
    {% vite_hmr_client %}
    {% vite_asset "src/main.js" %}
</head>
<body class="min-h-screen bg-base-200 flex items-center justify-center">
    <div class="card w-full max-w-md bg-base-100 shadow-xl">
        <div class="card-body">
            <h2 class="card-title text-2xl mb-4">djafatt</h2>
            {% if form.errors %}
            <div class="alert alert-error mb-4">
                <span>Credenziali non valide.</span>
            </div>
            {% endif %}
            <form method="post">
                {% csrf_token %}
                <div class="form-control mb-4">
                    <label class="label"><span class="label-text">Username</span></label>
                    <input type="text" name="username" class="input input-bordered w-full" required autofocus>
                </div>
                <div class="form-control mb-6">
                    <label class="label"><span class="label-text">Password</span></label>
                    <input type="password" name="password" class="input input-bordered w-full" required>
                </div>
                <button type="submit" class="btn btn-primary w-full">Accedi</button>
            </form>
        </div>
    </div>
</body>
</html>
